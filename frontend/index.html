<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vota por la Mascota — Facultad de Ingeniería USB Cali</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header class="encabezado">
        <span class="etiqueta">Elección oficial</span>
        <h1>Mascota de la Facultad</h1>
        <p>Ingeniería — USB Cali</p>
    </header>

    <main class="container py-5">

        <div class="tarjeta-principal">

            <div id="alerta" class="alerta-custom d-none" role="alert"></div>

            <form id="form-voto">

                <div class="campo-codigo mb-4">
                    <label for="codigo">Código estudiantil</label>
                    <input type="text" id="codigo" placeholder="Ej: 2210123" required>
                </div>

                <hr class="divisor">

                <p class="seccion-titulo">Elige tu candidato</p>

                <div class="row g-3 mb-4">

                    <div class="col-md-4">
                        <label class="tarjeta-candidato" for="c1">
                            <div class="img-candidato">
                                <img src="img/pachito.png" alt="Pavo Real">
                            </div>
                            <span class="nombre-candidato">Pavo Real</span>
                            <input type="radio" name="candidato" id="c1" value="1" required>
                        </label>
                    </div>

                    <div class="col-md-4">
                        <label class="tarjeta-candidato" for="c2">
                            <div class="img-candidato">
                                <img src="img/pato.jpg" alt="Pato">
                            </div>
                            <span class="nombre-candidato">Pato</span>
                            <input type="radio" name="candidato" id="c2" value="2">
                        </label>
                    </div>

                    <div class="col-md-4">
                        <label class="tarjeta-candidato" for="c3">
                            <div class="img-candidato">
                                <img src="img/ganso.jpg" alt="Ganso">
                            </div>
                            <span class="nombre-candidato">Ganso</span>
                            <input type="radio" name="candidato" id="c3" value="3">
                        </label>
                    </div>

                </div>

                <button type="submit" class="btn-votar">Emitir voto</button>

            </form>
        </div>

        <div class="link-pie">
            <a href="resultados.html">Ver resultados parciales →</a>
        </div>

    </main>

    <script src="js/votar.js"></script>
</body>
</html>
