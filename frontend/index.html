<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vota por la Mascota — Facultad de Ingeniería USB Cali</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="fw-bold">Mascota de la Facultad de Ingeniería</h1>
            <p class="text-muted">USB Cali — Votación oficial</p>
        </div>

        <div class="card shadow-sm mx-auto" style="max-width: 700px;">
            <div class="card-body p-4">

                <div id="alerta" class="alert d-none mb-3" role="alert"></div>

                <form id="form-voto">
                    <div class="mb-4">
                        <label for="codigo" class="form-label fw-semibold">Código estudiantil</label>
                        <input type="text" id="codigo" class="form-control" placeholder="Ej: 2210123" required>
                    </div>

                    <p class="fw-semibold mb-3">Elige tu candidato:</p>

                    <div class="row g-3 mb-4">

                        <div class="col-md-4">
                            <label class="tarjeta-candidato" for="c1">
                                <img src="img/Copilot_20260519_165845.png" alt="Pavo Real">
                                <span>Pavo Real</span>
                                <input type="radio" name="candidato" id="c1" value="1" required>
                            </label>
                        </div>

                        <div class="col-md-4">
                            <label class="tarjeta-candidato" for="c2">
                                <img src="img/Copilot_20260519_165852.png" alt="Pato">
                                <span>Pato</span>
                                <input type="radio" name="candidato" id="c2" value="2">
                            </label>
                        </div>

                        <div class="col-md-4">
                            <label class="tarjeta-candidato" for="c3">
                                <img src="img/Copilot_20260519_170101.png" alt="Ganso">
                                <span>Ganso</span>
                                <input type="radio" name="candidato" id="c3" value="3">
                            </label>
                        </div>

                    </div>

                    <button type="submit" class="btn btn-primary w-100">Emitir voto</button>
                </form>

            </div>
        </div>

        <div class="text-center mt-3">
            <a href="resultados.html">Ver resultados parciales →</a>
        </div>
    </div>

    <script src="js/votar.js"></script>
</body>
</html>
